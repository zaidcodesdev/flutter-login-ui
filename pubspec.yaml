name: classico
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_spinkit: ^5.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/Icons/
    - assets/Images/
  fonts:
   - family: poppins
     fonts:
       - asset: assets/fonts/Poppins-Regular.ttf

   - family: cursive
     fonts:
       - asset: assets/fonts/CedarvilleCursive-Regular.ttf